<!DOCTYPE html>
<html>
<head>

<title>Phishing URL Detector</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
margin-top:120px;
}

.container{
background:white;
padding:40px;
width:400px;
margin:auto;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin-top:10px;
}

button{
padding:10px 20px;
margin-top:15px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Phishing URL Detector</h2>

<form action="/predict" method="post">

<input type="text" name="url" placeholder="Enter URL" required>

<br>

<button type="submit">Check URL</button>

</form>

<div class="result">

{% if prediction_text %}
Result: {{ prediction_text }}
{% endif %}

</div>

</div>

</body>

</html>
